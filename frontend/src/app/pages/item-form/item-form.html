<div class="bg-gray-50 min-h-[calc(100vh-120px)]">
    <!-- Header area -->
    <div class="bg-white shadow-md">
      <div class="mx-auto max-w-7xl px-6 py-6">
        <a
          routerLink="/items"
          class="inline-flex items-center gap-2 text-sm font-medium text-gray-700 hover:text-gray-900"
        >
          <!-- back arrow -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          Back to Dashboard
        </a>
  
        <h1 class="mt-4 text-4xl font-semibold text-gray-900">
          {{ isEdit ? 'Edit Item' : 'Add Item' }}
        </h1>
      </div>
    </div>
  
    <!-- Body -->
    <div class="mx-auto max-w-7xl px-6 py-10">
      <div
        *ngIf="error"
        class="mx-auto mb-4 max-w-3xl rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
      >
        {{ error }}
      </div>
  
      <div class="mx-auto max-w-3xl rounded-2xl border border-gray-200 bg-white shadow-sm">
        <div class="p-8">
          <h2 class="text-lg font-semibold text-gray-900">Item Details</h2>
          <p class="mt-1 text-sm text-gray-600">Update the information for this item</p>
  
          <form class="mt-8 space-y-6" [formGroup]="form" (ngSubmit)="submit()">
            <!-- Name -->
            <div>
              <label class="block text-sm font-semibold text-gray-900">Name <span class="text-red-500">*</span></label>
              <input
                formControlName="title"
                [disabled]="loading"
                class="mt-2 w-full rounded-xl bg-gray-100 px-4 py-3 text-gray-900 outline-none ring-1 ring-gray-200 focus:bg-white focus:ring-2 focus:ring-gray-900 disabled:opacity-60"
              />
              <p
                *ngIf="form.controls.title.touched && form.controls.title.errors?.['required']"
                class="mt-2 text-sm text-red-600"
              >
                Name is required.
              </p>
            </div>
  
            <!-- Description -->
            <div>
              <label class="block text-sm font-semibold text-gray-900">Description</label>
              <textarea
                formControlName="description"
                rows="3"
                [disabled]="loading"
                class="mt-2 w-full rounded-xl bg-gray-100 px-4 py-3 text-gray-900 outline-none ring-1 ring-gray-200 focus:bg-white focus:ring-2 focus:ring-gray-900 disabled:opacity-60"
              ></textarea>
            </div>
  
            <!-- Category -->
            <div>
              <label class="block text-sm font-semibold text-gray-900">Category</label>
              <input
                formControlName="category"
                [disabled]="loading"
                class="mt-2 w-full rounded-xl bg-gray-100 px-4 py-3 text-gray-900 outline-none ring-1 ring-gray-200 focus:bg-white focus:ring-2 focus:ring-gray-900 disabled:opacity-60"
              />
            </div>
  
            <!-- Buttons -->
            <div class="pt-2 flex gap-6">
              <button
                type="submit"
                [disabled]="loading || form.invalid"
                class="w-full rounded-xl bg-gradient-to-b from-gray-950 to-gray-800 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-60"
              >
                {{ isEdit ? 'Update Item' : 'Add Item' }}
              </button>
  
              <button
                type="button"
                (click)="goBack()"
                class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm font-semibold text-gray-900 hover:bg-gray-50"
              >
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
