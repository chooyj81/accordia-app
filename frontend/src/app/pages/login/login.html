<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-xl rounded-2xl border border-gray-200 bg-white shadow-sm">
      <div class="p-8">
        <h2 class="text-2xl font-semibold text-gray-900">Login</h2>
        <p class="mt-1 text-gray-500">Enter your credentials to access your account</p>
  
        <!-- Error -->
        <div
          *ngIf="error"
          class="mt-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
        >
          {{ error }}
        </div>
  
        <form class="mt-6 space-y-5" [formGroup]="form" (ngSubmit)="submit()">
          <!-- Email -->
          <div>
            <label class="block text-sm font-semibold text-gray-900">Email</label>
            <input
              type="email"
              formControlName="email"
              placeholder="your@email.com"
              class="mt-2 w-full rounded-xl bg-gray-100 px-4 py-3 text-gray-900 placeholder-gray-400 outline-none ring-1 ring-gray-200 focus:bg-white focus:ring-2 focus:ring-gray-900"
            />
          </div>
  
          <!-- Password -->
          <div>
            <label class="block text-sm font-semibold text-gray-900">Password</label>
            <input
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="mt-2 w-full rounded-xl bg-gray-100 px-4 py-3 text-gray-900 placeholder-gray-400 outline-none ring-1 ring-gray-200 focus:bg-white focus:ring-2 focus:ring-gray-900"
            />
          </div>
  
          <!-- Button -->
          <button
            type="submit"
            [disabled]="form.invalid"
            class="w-full rounded-xl bg-gradient-to-b from-gray-950 to-gray-800 px-4 py-3 font-semibold text-white shadow-sm transition hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-60"
          >
            Login
          </button>
        </form>
  
        <!-- Footer -->
        <p class="mt-6 text-center text-sm text-gray-700">
          Don’t have an account?
          <a routerLink="/register" class="font-semibold text-blue-600 hover:underline">
            Register here
          </a>
        </p>
      </div>
    </div>
  </div>
